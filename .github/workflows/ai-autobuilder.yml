name: AI Autobuilder (OpenAI)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-fix:

    # prevent infinite loops from bot commits
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            bison \
            flex \
            wget \
            unzip

          pip install platformio requests || true

      - name: Detect build command
        id: detect
        run: |
          if [ -f platformio.ini ]; then
            CMD="pio run"
          elif [ -f Makefile ] || [ -f makefile ]; then
            CMD="make -j"
          elif [ -f CMakeLists.txt ]; then
            CMD="cmake -B build && cmake --build build"
          else
            CMD="make -j"
          fi

          echo "BUILD_CMD=$CMD" >> $GITHUB_OUTPUT

      - name: First build
        id: build
        run: |
          set -o pipefail
          echo "Running build command: ${{ steps.detect.outputs.BUILD_CMD }}"
          bash -lc "${{ steps.detect.outputs.BUILD_CMD }}" | tee build.log
        continue-on-error: true

      - name: Ensure BusyBox config
        if: steps.build.outcome != 'success'
        run: |
          if [ -f Makefile ] && grep -q "busybox" Makefile 2>/dev/null; then
            echo "BusyBox project detected"
            if [ ! -f .config ]; then
              make defconfig || true
            fi
          fi

      - name: Run AI Autobuilder
        if: steps.build.outcome != 'success'
        env:
          PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          AI_BUILDER_ATTEMPTS: "2"
          BUILD_CMD: ${{ steps.detect.outputs.BUILD_CMD }}
        run: |
          python tools/ai_autobuilder.py || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: fix/ai-autobuilder-${{ github.run_id }}
          base: main
          title: "AI Autobuilder Fix"
          body: |
            Automated build fix generated by AI autobuilder.

            This patch was created automatically by the CI repair bot.
            Please review before merging.
          commit-message: "AI autobuilder: automated fix"
