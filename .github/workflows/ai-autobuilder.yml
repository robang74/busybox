name: AI Autobuilder

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-fix:

    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore AI memory
        uses: actions/cache@v4
        with:
          path: tools/ai_memory/db.json
          key: ai-memory-${{ github.repository }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            bison \
            flex \
            wget \
            unzip

          pip install requests || true

      - name: Run AI Autobuilder
        env:
          PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          python tools/ai_autobuilder.py || true

      - name: Check if files changed
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: fix/ai-autobuilder-${{ github.run_id }}
          base: main
          title: "AI Autobuilder Fix"
          body: |
            Automated build repair generated by AI autobuilder.

            The system may also create build modules under:

            tools/build/

            These modules teach the AI how to build this project.
          commit-message: "AI autobuilder: automated fix"
