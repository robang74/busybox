name: AI Autobuilder (OpenAI)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-fix:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "ai-autobuilder[bot]"
          git config --global user.email "ai-autobuilder@users.noreply.github.com"

      - name: Create working branch
        run: |
          BRANCH="fix/ai-autobuilder-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git bison flex
          pip install platformio requests || true

      - name: Detect build command
        id: detect
        run: |
          if [ -f platformio.ini ]; then
            CMD="pio run"
          elif [ -f Makefile ] || [ -f makefile ]; then
            CMD="make -j"
          elif [ -f CMakeLists.txt ]; then
            CMD="cmake -B build && cmake --build build"
          else
            CMD="make -j"
          fi
          echo "BUILD_CMD=$CMD" >> $GITHUB_OUTPUT

      - name: First build
        id: build
        run: |
          set -o pipefail
          bash -lc "${{ steps.detect.outputs.BUILD_CMD }}" | tee build.log
        continue-on-error: true

      - name: Run AI Autobuilder
        if: steps.build.outcome != 'success'
        env:
          PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          BUILD_CMD: ${{ steps.detect.outputs.BUILD_CMD }}
          AI_BUILDER_ATTEMPTS: "2"
        run: |
          python tools/ai_autobuilder.py || true

      - name: Commit changes if any
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "AI autobuilder: automatic fix"
          fi

      - name: Push branch
        run: |
          git push origin $BRANCH || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH }}
          title: "AI Autobuilder Fix"
          body: |
            Automated fix generated by AI autobuilder.
            Please review before merging.
