name: Build BusyBox Android ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: BusyBox version
        required: true
        default: "1.36.1"
      api:
        description: Android API level
        required: true
        default: "21"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: r26d
      NDK_ZIP: android-ndk-r26d-linux.zip
      NDK_DIR: android-ndk-r26d

    steps:

############################################################
# CHECKOUT
############################################################

      - name: Checkout
        uses: actions/checkout@v4

############################################################
# SET VARIABLES
############################################################

      - name: Set variables
        run: |
          echo "BUSYBOX_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "ANDROID_API=${{ github.event.inputs.api }}" >> $GITHUB_ENV

############################################################
# INSTALL BUILD TOOLS
############################################################

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            wget \
            bison \
            flex \
            unzip \
            file

############################################################
# DOWNLOAD ANDROID NDK
############################################################

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/${NDK_ZIP}
          unzip ${NDK_ZIP}

############################################################
# SET TOOLCHAIN
############################################################

      - name: Setup toolchain
        run: |
          echo "NDK=$PWD/${NDK_DIR}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/${NDK_DIR}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=$PWD/${NDK_DIR}/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV

############################################################
# DOWNLOAD BUSYBOX
############################################################

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2
          tar xf busybox-${BUSYBOX_VERSION}.tar.bz2

############################################################
# CONFIGURE BUSYBOX FOR ANDROID
############################################################

      - name: Configure BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          # Android-friendly config
          make android_ndk_defconfig

          # Disable init (Android incompatible)
          sed -i 's/^CONFIG_INIT=y/# CONFIG_INIT is not set/' .config

          # Disable bootchart
          sed -i 's/^CONFIG_BOOTCHARTD=y/# CONFIG_BOOTCHARTD is not set/' .config

          # Disable login utilities
          sed -i 's/^CONFIG_LOGIN=y/# CONFIG_LOGIN is not set/' .config
          sed -i 's/^CONFIG_SU=y/# CONFIG_SU is not set/' .config

          # Disable PAM and SELinux
          sed -i 's/^CONFIG_PAM=y/# CONFIG_PAM is not set/' .config
          sed -i 's/^CONFIG_SELINUX=y/# CONFIG_SELINUX is not set/' .config

          # Disable utmp/wtmp
          sed -i 's/^CONFIG_FEATURE_UTMP=y/# CONFIG_FEATURE_UTMP is not set/' .config
          sed -i 's/^CONFIG_FEATURE_WTMP=y/# CONFIG_FEATURE_WTMP is not set/' .config

          # Enable static binary
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

############################################################
# BUILD BUSYBOX
############################################################

      - name: Build BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          make -j$(nproc) \
            CC=$TOOLCHAIN/aarch64-linux-android${ANDROID_API}-clang \
            AR=$TOOLCHAIN/llvm-ar \
            RANLIB=$TOOLCHAIN/llvm-ranlib \
            STRIP=$TOOLCHAIN/llvm-strip \
            HOSTCC=gcc \
            CFLAGS="--sysroot=$SYSROOT -Os" \
            LDFLAGS="--sysroot=$SYSROOT"

############################################################
# STRIP BINARY
############################################################

      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip busybox-${BUSYBOX_VERSION}/busybox

############################################################
# PACKAGE
############################################################

      - name: Prepare release
        run: |
          mkdir release
          cp busybox-${BUSYBOX_VERSION}/busybox release/busybox
          chmod +x release/busybox

############################################################
# VERIFY
############################################################

      - name: Verify binary
        run: |
          file release/busybox
          ls -lh release/busybox

############################################################
# UPLOAD
############################################################

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ env.BUSYBOX_VERSION }}-android-arm64
          path: release/busybox
