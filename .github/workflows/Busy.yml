name: Build BusyBox Android ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: BusyBox version
        required: true
        default: "1.36.1"
      api:
        description: Android API level
        required: true
        default: "21"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: r26d
      NDK_ZIP: android-ndk-r26d-linux.zip
      NDK_DIR: android-ndk-r26d

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "BUSYBOX_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "ANDROID_API=${{ github.event.inputs.api }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            wget \
            bison \
            flex \
            unzip \
            file

      ############################################################
      # CACHE ANDROID NDK
      ############################################################

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget https://dl.google.com/android/repository/${NDK_ZIP}
          unzip ${NDK_ZIP}

      - name: Set toolchain paths
        run: |
          echo "NDK=$PWD/${NDK_DIR}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/${NDK_DIR}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=$PWD/${NDK_DIR}/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV

      ############################################################
      # CACHE BUSYBOX SOURCE
      ############################################################

      - name: Cache BusyBox Source
        id: cache-busybox
        uses: actions/cache@v4
        with:
          path: busybox-${{ env.BUSYBOX_VERSION }}
          key: busybox-${{ env.BUSYBOX_VERSION }}

      - name: Download BusyBox
        if: steps.cache-busybox.outputs.cache-hit != 'true'
        run: |
          wget https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2
          tar xf busybox-${BUSYBOX_VERSION}.tar.bz2

      ############################################################
      # CONFIGURE BUSYBOX
      ############################################################

      - name: Configure BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          make defconfig

          # Enable static binary
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

          # Disable debug for smaller binary
          sed -i 's/CONFIG_DEBUG=y/# CONFIG_DEBUG is not set/' .config

          # Non-interactive config update
          make olddefconfig

      ############################################################
      # BUILD BUSYBOX
      ############################################################

      - name: Build BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          export CC=$TOOLCHAIN/aarch64-linux-android${ANDROID_API}-clang
          export AR=$TOOLCHAIN/llvm-ar
          export RANLIB=$TOOLCHAIN/llvm-ranlib
          export STRIP=$TOOLCHAIN/llvm-strip

          make -j$(nproc) \
            CC=$CC \
            AR=$AR \
            RANLIB=$RANLIB \
            HOSTCC=gcc \
            CFLAGS="--sysroot=$SYSROOT" \
            LDFLAGS="--sysroot=$SYSROOT"

      ############################################################
      # STRIP AND PACKAGE
      ############################################################

      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip busybox-${BUSYBOX_VERSION}/busybox

      - name: Prepare release
        run: |
          mkdir release
          cp busybox-${BUSYBOX_VERSION}/busybox release/busybox
          chmod +x release/busybox

      - name: Verify binary
        run: |
          file release/busybox
          ls -lh release/busybox

      ############################################################
      # UPLOAD ARTIFACT
      ############################################################

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ env.BUSYBOX_VERSION }}-android-arm64
          path: release/busybox
