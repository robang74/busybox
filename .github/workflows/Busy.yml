name: Build BusyBox Android (Multi-Arch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - arm64
          - arm
          - x86
          - x86_64

    env:
      BUSYBOX_VERSION: 1.36.1
      ANDROID_API: 21
      NDK_VERSION: r26d

    steps:

# Checkout
      - uses: actions/checkout@v4

# Install dependencies
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            wget \
            bison \
            flex \
            unzip

# Download Android NDK
      - name: Download NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip

# Setup environment
      - name: Setup toolchain
        run: |
          echo "NDK=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV

# Download BusyBox
      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2
          tar xf busybox-${BUSYBOX_VERSION}.tar.bz2

# Configure
      - name: Configure BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          cp configs/android_ndk_defconfig .config

# Build
      - name: Build BusyBox
        run: |
          cd busybox-${BUSYBOX_VERSION}

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET=aarch64-linux-android
            ARCH=arm64
          elif [ "${{ matrix.arch }}" = "arm" ]; then
            TARGET=armv7a-linux-androideabi
            ARCH=arm
          elif [ "${{ matrix.arch }}" = "x86" ]; then
            TARGET=i686-linux-android
            ARCH=x86
          elif [ "${{ matrix.arch }}" = "x86_64" ]; then
            TARGET=x86_64-linux-android
            ARCH=x86_64
          fi

          make -j$(nproc) \
            ARCH=$ARCH \
            CC=$TOOLCHAIN/${TARGET}${ANDROID_API}-clang \
            AR=$TOOLCHAIN/llvm-ar \
            RANLIB=$TOOLCHAIN/llvm-ranlib \
            STRIP=$TOOLCHAIN/llvm-strip \
            HOSTCC=gcc \
            CFLAGS="--sysroot=$SYSROOT" \
            LDFLAGS="--sysroot=$SYSROOT"

# Strip binary
      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip busybox-${BUSYBOX_VERSION}/busybox

# Package
      - name: Package artifact
        run: |
          mkdir -p release
          cp busybox-${BUSYBOX_VERSION}/busybox release/busybox-${{ matrix.arch }}

# Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.arch }}
          path: release/busybox-${{ matrix.arch }}
