name: Build BusyBox (Magisk Method)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

############################################################
# CHECKOUT MAGISK SOURCE
############################################################

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: topjohnwu/Magisk
          submodules: recursive

############################################################
# INSTALL DEPENDENCIES
############################################################

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            unzip \
            zip \
            git

############################################################
# INSTALL ANDROID SDK
############################################################

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

############################################################
# INSTALL MAGISK NDK
############################################################

      - name: Install Magisk NDK
        run: |
          python3 build.py ndk

############################################################
# BUILD NATIVE BINARIES
############################################################

      - name: Build native tools
        run: |
          python3 build.py native

############################################################
# COLLECT BUSYBOX BINARIES
############################################################

      - name: Collect BusyBox
        run: |
          mkdir busybox
          cp native/out/*/busybox busybox/ || true

############################################################
# UPLOAD ARTIFACTS
############################################################

      - name: Upload BusyBox binaries
        uses: actions/upload-artifact@v4
        with:
          name: busybox-magisk
          path: busybox
