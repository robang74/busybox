name: BusyBox Build Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        method:
          - clang-static
          - clang-shared
          - clang-api21
          - clang-api24
          - clang-api26
          - clang-api29
          - clang-api33
          - llvm-cross
          - minimal-config
          - full-config

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            wget \
            bison \
            flex \
            unzip \
            file

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar xf busybox-1.36.1.tar.bz2

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Configure BusyBox
        run: |
          cd busybox-1.36.1
          make defconfig

          if [ "${{ matrix.method }}" = "minimal-config" ]; then
            make allnoconfig
          fi

          if [ "${{ matrix.method }}" = "full-config" ]; then
            make allyesconfig
          fi

          if [ "${{ matrix.method }}" = "clang-static" ]; then
            sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          fi

      - name: Build BusyBox
        run: |
          cd busybox-1.36.1

          API=21

          case "${{ matrix.method }}" in
            clang-api24) API=24 ;;
            clang-api26) API=26 ;;
            clang-api29) API=29 ;;
            clang-api33) API=33 ;;
          esac

          make -j$(nproc) \
            CC=$TOOLCHAIN/aarch64-linux-android${API}-clang \
            HOSTCC=gcc

      - name: Strip binary
        run: |
          $TOOLCHAIN/llvm-strip busybox-1.36.1/busybox

      - name: Save build
        run: |
          mkdir -p release
          cp busybox-1.36.1/busybox release/busybox-${{ matrix.method }}

      - name: Verify binary
        run: |
          file release/busybox-${{ matrix.method }}
          ls -lh release/busybox-${{ matrix.method }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.method }}
          path: release/busybox-${{ matrix.method }}
