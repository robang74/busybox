name: Build BusyBox Android ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BusyBox source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            flex \
            wget \
            unzip

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Setup toolchain
        run: |
          echo "TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Configure BusyBox
        run: |
          make defconfig
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

      - name: Build BusyBox
        run: |
          make -j$(nproc) \
            ARCH=arm64 \
            CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang \
            HOSTCC=gcc

      - name: Strip binary
        run: |
          $TOOLCHAIN/bin/llvm-strip busybox

      - name: Rename binary
        run: mv busybox busybox-arm64

      - name: Verify binary
        run: |
          file busybox-arm64
          ls -lh busybox-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-android-arm64
          path: busybox-arm64
